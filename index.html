<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0fdf4; }
        .pastel-green { background-color: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-lg">
        <h1 class="text-2xl font-bold text-center mb-6 text-green-800">ระบบเช็คสินค้าหมดอายุ</h1>
        
        <!-- ฟอร์มเพิ่มสินค้า -->
        <div class="mb-8 p-4 pastel-green rounded-lg">
            <input type="text" id="itemName" placeholder="ชื่อสินค้า" class="p-2 rounded border mr-2">
            <input type="date" id="expiryDate" class="p-2 rounded border mr-2">
            <button onclick="addItem()" class="bg-green-600 text-white px-4 py-2 rounded">เพิ่มสินค้า</button>
        </div>

        <!-- รายการสินค้า -->
        <div id="productList" class="space-y-2">
            <!-- ข้อมูลจะแสดงที่นี่ -->
        </div>
    </div>

    <script>
        let products = [];
        function addItem() {
            const name = document.getElementById('itemName').value;
            const date = new Date(document.getElementById('expiryDate').value);
            const today = new Date();
            const diffDays = Math.ceil((date - today) / (1000 * 60 * 60 * 24));
            
            products.push({ name, date: date.toLocaleDateString(), diffDays });
            render();
        }

        function render() {
            const list = document.getElementById('productList');
            list.innerHTML = products.map(p => {
                let color = "bg-green-100";
                if (p.diffDays < 0) color = "bg-red-200";
                else if (p.diffDays <= 7) color = "bg-yellow-100";
                
                return `<div class="p-3 rounded-lg ${color} flex justify-between">
                    <span>${p.name}</span>
                    <span>หมดอายุใน: ${p.diffDays} วัน</span>
                </div>`;
            }).join('');
        }
    </script>
</body>
</html>
